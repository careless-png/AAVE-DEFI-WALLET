<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="DeFi Wallet">
<meta name="theme-color" content="#1C1F22">
<title>DeFi Wallet</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#1C1F22;--card:#24272A;--card2:#2D3135;--card3:#35393E;
  --border:rgba(255,255,255,0.07);--orange:#F6851B;--og:rgba(246,133,27,0.15);
  --green:#10B981;--red:#EF4444;--blue:#3B82F6;--purple:#8B5CF6;
  --text:#E8EAF0;--muted:#9B9EA8;--dim:#5A5D66;
  --font:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;
  --r:16px;
}
html{height:100%;background:#0a0a0a}
body{height:100%;font-family:var(--font);background:#0a0a0a;color:var(--text);overflow:hidden;
  -webkit-text-size-adjust:100%;-webkit-tap-highlight-color:transparent}
button,input,select{font-family:var(--font)}

/* ── App Shell ── */
#app{height:100%;max-width:430px;margin:0 auto;display:flex;flex-direction:column;
  background:var(--bg);box-shadow:0 0 120px rgba(0,0,0,0.9),0 0 0 1px rgba(255,255,255,0.04);
  position:relative;overflow:hidden}

/* ── Header ── */
.hdr{background:var(--card);border-bottom:1px solid var(--border);flex-shrink:0}
.hdr-top{display:flex;align-items:center;justify-content:space-between;
  padding:calc(env(safe-area-inset-top,0px) + 14px) 18px 0}
.net{display:flex;align-items:center;gap:6px;background:var(--card2);
  border-radius:20px;padding:6px 13px;cursor:pointer;user-select:none}
.net-dot{width:7px;height:7px;border-radius:50%;background:var(--green)}
.net-nm{color:var(--text);font-size:12px;font-weight:600}
.net-arr{color:var(--muted);font-size:9px}
.fox{cursor:pointer;padding:4px;user-select:none;-webkit-user-select:none;display:flex;align-items:center}
.dots{display:flex;gap:3px;padding:8px;cursor:pointer}
.dot{width:4px;height:4px;border-radius:50%;background:var(--muted)}
.acct{display:flex;flex-direction:column;align-items:center;padding:12px 18px 18px}
.avatar{width:46px;height:46px;border-radius:50%;
  background:linear-gradient(135deg,#E2761B 0%,#F6851B 40%,#6B7280 70%,#374151 100%);
  margin-bottom:8px;border:2px solid rgba(246,133,27,0.3)}
.acct-name{display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none}
.acct-lbl{color:var(--text);font-size:14px;font-weight:600}
.acct-addr{color:var(--muted);font-size:12px}
.cp-ic{color:var(--muted);font-size:12px;transition:color .2s}

/* ── Balance Hero ── */
.hero{padding:22px 18px 14px;text-align:center;background:var(--card)}
.hero-amt{font-size:38px;font-weight:700;color:#fff;letter-spacing:-1px;line-height:1}
.hero-sub{color:var(--muted);font-size:12px;margin-top:3px}
.vbadge{display:inline-flex;align-items:center;gap:5px;
  background:rgba(16,185,129,0.08);border:1px solid rgba(16,185,129,0.22);
  border-radius:20px;padding:4px 12px;margin-top:10px}
.vdot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
.vtxt{color:var(--green);font-size:11px;font-weight:600}
.live-pill{display:inline-flex;align-items:center;gap:4px;
  background:rgba(59,130,246,0.08);border:1px solid rgba(59,130,246,0.2);
  border-radius:12px;padding:2px 8px;margin-left:6px;vertical-align:middle}
.live-txt{color:var(--blue);font-size:9px;font-weight:700;letter-spacing:.5px}

/* ── Actions ── */
.actions{display:flex;justify-content:center;gap:18px;margin-top:20px}
.act{display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;border:none;background:none;color:inherit}
.act-c{width:46px;height:46px;border-radius:50%;background:var(--card2);
  display:flex;align-items:center;justify-content:center;font-size:18px;
  transition:background .2s,transform .15s}
.act-c:hover{background:var(--orange)}
.act-c:active{transform:scale(.91)}
.act-lbl{color:var(--muted);font-size:11px;font-weight:500}

/* ── Tabs ── */
.tabs{display:flex;border-bottom:1px solid var(--border);background:var(--card);flex-shrink:0}
.tab{flex:1;padding:11px 0;background:none;border:none;border-bottom:2px solid transparent;
  cursor:pointer;font-size:13px;font-weight:600;color:var(--muted);transition:all .2s}
.tab.on{color:var(--orange);border-bottom-color:var(--orange)}

/* ── Scroll ── */
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;background:var(--bg)}
.scroll::-webkit-scrollbar{display:none}

/* ── Token rows ── */
.tok-row{display:flex;align-items:center;padding:13px 18px;
  border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s}
.tok-row:active{background:rgba(255,255,255,0.02)}
.tok-ic{width:38px;height:38px;border-radius:50%;margin-right:12px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;overflow:hidden}
.tok-info{flex:1}
.tok-sym{font-size:14px;font-weight:600;color:var(--text)}
.tok-bal{font-size:12px;color:var(--muted);margin-top:1px}
.tok-vals{text-align:right}
.tok-usd{font-size:14px;font-weight:600;color:var(--text)}
.tok-chg{font-size:12px;margin-top:1px}
.pos{color:var(--green)}.neg{color:var(--red)}.neu{color:var(--muted)}
.price-tag{font-size:9px;color:var(--blue);background:rgba(59,130,246,0.08);
  padding:1px 5px;border-radius:4px;font-weight:700;display:inline-block;margin-left:4px}

/* ── DeFi Section ── */
.defi-hdr{padding:18px 18px 6px}
.defi-lbl{font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:1.5px}
.defi-total{font-size:32px;font-weight:700;color:#fff;letter-spacing:-.5px;margin-top:2px}
.defi-sub{font-size:12px;color:var(--muted);margin-top:3px;margin-bottom:14px}
.pool-card{margin:0 14px 12px;background:var(--card);border-radius:var(--r);
  padding:15px;border:1px solid var(--border)}
.pool-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px}
.pool-left{display:flex;align-items:center;gap:10px}
.pool-ic{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;
  justify-content:center;font-size:13px;font-weight:800;color:white;flex-shrink:0}
.pool-nm{font-size:14px;font-weight:700;color:var(--text)}
.pool-pr{font-size:11px;color:var(--muted);margin-top:2px}
.pool-right{text-align:right}
.pool-amt{font-size:16px;font-weight:700;color:var(--text)}
.pool-apy{font-size:12px;color:var(--green);font-weight:600;margin-top:1px}
.lk-badge{display:inline-flex;align-items:center;gap:3px;
  background:rgba(246,133,27,0.08);border:1px solid rgba(246,133,27,0.2);
  border-radius:6px;padding:2px 8px;margin-top:4px}
.lk-txt{color:var(--orange);font-size:10px;font-weight:700}
.prog-wrap{margin-bottom:8px}
.prog-lbls{display:flex;justify-content:space-between;margin-bottom:4px}
.prog-lbl{font-size:10px;color:var(--muted)}
.prog-bar{height:5px;background:var(--card2);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#F6851B,#FFB347)}
.cd-row{display:flex;align-items:center;justify-content:space-between}
.lk-dates{font-size:10px;color:var(--muted)}
.cd{font-size:11px;color:var(--orange);font-weight:600;font-variant-numeric:tabular-nums}
.cd.done{color:var(--green)}

/* ── Activity ── */
.tx-row{display:flex;align-items:center;padding:13px 18px;
  border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s}
.tx-row:active{background:rgba(255,255,255,0.02)}
.tx-ic{width:38px;height:38px;border-radius:50%;margin-right:12px;
  display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.tx-info{flex:1}
.tx-type{font-size:14px;font-weight:600;color:var(--text)}
.tx-addr{font-size:11px;color:var(--muted);margin-top:1px;font-family:monospace}
.tx-vals{text-align:right}
.tx-amt{font-size:14px;font-weight:600}
.tx-date{font-size:11px;color:var(--muted);margin-top:1px}

/* ── KYC ── */
.kyc-wrap{padding:16px}
.kyc-card{background:var(--card);border-radius:20px;padding:22px;
  border:1px solid rgba(16,185,129,0.15);margin-bottom:12px}
.kyc-hdr{display:flex;align-items:center;gap:14px;margin-bottom:18px;
  padding-bottom:16px;border-bottom:1px solid var(--border)}
.kyc-av{width:54px;height:54px;border-radius:50%;
  background:linear-gradient(135deg,#10B981,#059669);
  display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.kyc-nm{font-size:17px;font-weight:700;color:var(--text)}
.kyc-sbadge{display:inline-flex;align-items:center;gap:4px;
  background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.3);
  border-radius:20px;padding:3px 10px;margin-top:4px}
.kyc-stxt{color:var(--green);font-size:11px;font-weight:700}
.kyc-fields{display:flex;flex-direction:column;gap:12px}
.kyc-f{display:flex;flex-direction:column;gap:3px}
.kyc-fl{font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:1px}
.kyc-fv{font-size:14px;color:var(--text);font-weight:500}
.kyc-badges{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
.kbadge{display:inline-flex;align-items:center;gap:4px;border-radius:8px;padding:4px 10px;font-size:11px;font-weight:700}
.kbadge.g{background:rgba(16,185,129,0.1);color:var(--green);border:1px solid rgba(16,185,129,0.25)}
.kbadge.o{background:rgba(246,133,27,0.1);color:var(--orange);border:1px solid rgba(246,133,27,0.2)}
.kbadge.b{background:rgba(59,130,246,0.1);color:var(--blue);border:1px solid rgba(59,130,246,0.2)}
.kbadge.p{background:rgba(139,92,246,0.1);color:var(--purple);border:1px solid rgba(139,92,246,0.2)}

/* ── Bottom Nav ── */
.bnav{display:flex;background:var(--card);border-top:1px solid var(--border);
  padding-bottom:max(16px,env(safe-area-inset-bottom,0px));flex-shrink:0}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:10px 0 4px;cursor:pointer;user-select:none;border:none;background:none}
.bnav-ic{font-size:20px;line-height:1}
.bnav-lbl{font-size:10px;font-weight:600;color:var(--muted);transition:color .2s}
.bnav-item.on .bnav-lbl{color:var(--orange)}
.bnav-pip{width:4px;height:4px;border-radius:50%;background:var(--orange)}

/* ── Empty ── */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:60px 20px;text-align:center}
.empty-ic{font-size:36px;margin-bottom:10px}
.empty-tx{color:var(--muted);font-size:14px}

/* ── Overlay ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.88);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  display:flex;align-items:flex-end;justify-content:center;z-index:100}
.overlay.ctr{align-items:center;padding:16px}

/* Bottom sheet */
.sheet{background:#1A1D21;border-radius:24px 24px 0 0;width:100%;max-width:430px;
  max-height:92vh;overflow-y:auto;
  padding-bottom:max(24px,env(safe-area-inset-bottom,0px));
  animation:slideUp .3s cubic-bezier(.34,1.56,.64,1)}
.sheet::-webkit-scrollbar{display:none}
.sh-drag{width:36px;height:4px;background:rgba(255,255,255,0.15);border-radius:2px;margin:12px auto 0}
.sh-title{font-size:18px;font-weight:700;color:var(--text);text-align:center;padding:14px 20px 4px}
.sh-body{padding:14px 20px 8px}

/* Admin */
.adm-modal{background:#1A1D21;border:1px solid rgba(246,133,27,0.2);border-radius:20px;
  width:100%;max-width:540px;max-height:92vh;overflow-y:auto;
  box-shadow:0 24px 80px rgba(0,0,0,0.8);animation:fadeIn .2s ease}
.adm-modal::-webkit-scrollbar{display:none}
.adm-hdr{display:flex;justify-content:space-between;align-items:center;
  padding:18px 22px 14px;border-bottom:1px solid var(--border);
  position:sticky;top:0;background:#1A1D21;z-index:10}
.adm-tag{color:var(--orange);font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase}
.adm-ttl{color:var(--text);font-size:18px;font-weight:700}
.close-btn{width:32px;height:32px;background:var(--card2);border:none;border-radius:8px;
  color:var(--muted);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
.adm-body{padding:18px 22px 24px}
.sec{margin-bottom:26px}
.sec-t{color:var(--muted);font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:12px}
.field{margin-bottom:10px}
.field label{display:block;color:var(--muted);font-size:11px;margin-bottom:5px}
.field input,.field select{width:100%;padding:10px 13px;background:var(--card);
  border:1px solid rgba(255,255,255,0.08);border-radius:10px;color:var(--text);
  font-size:13px;outline:none;transition:border-color .2s}
.field input:focus,.field select:focus{border-color:var(--orange)}
.field input[type=color]{padding:4px 8px;height:38px;cursor:pointer}
.field input[type=date]{color-scheme:dark}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.span2{grid-column:1/-1}
.edit-card{background:var(--card);border-radius:12px;padding:13px;margin-bottom:10px;border:1px solid var(--border)}
.edit-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px}
.edit-nm{font-size:13px;font-weight:700;color:var(--orange)}
.rm-btn{background:rgba(239,68,68,0.1);border:none;border-radius:7px;color:var(--red);
  padding:4px 10px;cursor:pointer;font-size:11px;font-weight:600}
.tog-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0}
.tog-info div:first-child{font-size:14px;font-weight:600;color:var(--text)}
.tog-info div:last-child{font-size:11px;color:var(--muted);margin-top:2px}
.tog{width:46px;height:26px;border-radius:13px;position:relative;cursor:pointer;transition:background .3s;flex-shrink:0}
.tog-th{position:absolute;top:3px;width:20px;height:20px;border-radius:50%;background:white;
  transition:left .3s;box-shadow:0 1px 4px rgba(0,0,0,0.3);pointer-events:none}
.btn-row{display:flex;gap:10px}
.btn{padding:13px;border:none;border-radius:14px;font-size:14px;font-weight:600;cursor:pointer;transition:opacity .2s,transform .15s}
.btn:active{transform:scale(.97)}
.btn-ghost{background:var(--card2);color:var(--muted);flex:1}
.btn-pri{background:linear-gradient(135deg,#F6851B,#E2761B);color:#fff;flex:2;font-weight:700;box-shadow:0 4px 16px rgba(246,133,27,0.3)}
.btn-full{width:100%}
.btn-grn{background:linear-gradient(135deg,#10B981,#059669);color:#fff;box-shadow:0 4px 16px rgba(16,185,129,0.3)}
.add-btn{width:100%;padding:10px;background:rgba(246,133,27,0.06);
  border:1px dashed rgba(246,133,27,0.3);border-radius:12px;
  color:var(--orange);cursor:pointer;font-size:13px;font-weight:600}

/* Send / Swap / Receive */
.sf{display:flex;flex-direction:column;gap:14px}
.sf-f{display:flex;flex-direction:column;gap:5px}
.sf-lbl{font-size:12px;color:var(--muted);font-weight:600}
.sf-in{width:100%;padding:13px 14px;background:var(--card2);
  border:1px solid rgba(255,255,255,0.08);border-radius:14px;color:var(--text);
  font-size:16px;outline:none;transition:border-color .2s}
.sf-in:focus{border-color:var(--orange)}
.sf-in::placeholder{color:var(--muted);font-size:14px}
select.sf-in{cursor:pointer}
.sf-in-wrap{position:relative}
.sf-max{position:absolute;right:13px;top:50%;transform:translateY(-50%);
  color:var(--orange);font-size:12px;font-weight:700;cursor:pointer}
.sf-hint{font-size:11px;color:var(--muted);margin-top:3px}
.swap-arr{text-align:center;font-size:20px;color:var(--orange);cursor:pointer;margin:-4px 0}
.conf-row{display:flex;justify-content:space-between;align-items:center;
  padding:12px 0;border-bottom:1px solid var(--border)}
.conf-row:last-of-type{border-bottom:none}
.conf-lbl{font-size:13px;color:var(--muted)}
.conf-val{font-size:13px;color:var(--text);font-weight:600;text-align:right;max-width:60%;word-break:break-all}
.conf-val.big{font-size:16px}.conf-val.or{color:var(--orange)}.conf-val.rd{color:var(--red)}
.proc-wrap{display:flex;flex-direction:column;align-items:center;padding:40px 20px;gap:14px}
.spin{width:56px;height:56px;border:3px solid rgba(246,133,27,0.2);
  border-top-color:var(--orange);border-radius:50%;animation:spin .8s linear infinite}
.proc-tx{color:var(--text);font-size:16px;font-weight:600;text-align:center}
.proc-sx{color:var(--muted);font-size:13px;text-align:center}
.suc-wrap{display:flex;flex-direction:column;align-items:center;padding:32px 20px;gap:12px}
.suc-check{width:64px;height:64px;border-radius:50%;background:rgba(16,185,129,0.12);
  border:2px solid rgba(16,185,129,0.3);display:flex;align-items:center;justify-content:center;
  font-size:28px;animation:popIn .4s cubic-bezier(.34,1.56,.64,1)}
.suc-ttl{font-size:20px;font-weight:700;color:var(--text)}
.suc-sub{font-size:13px;color:var(--muted);text-align:center;line-height:1.5}
.hash-chip{background:var(--card2);border-radius:10px;padding:8px 14px;
  font-size:11px;color:var(--muted);font-family:monospace;cursor:pointer}
.ethlink{color:var(--blue);font-size:12px;text-decoration:none}

/* QR */
.qr-wrap{display:flex;flex-direction:column;align-items:center;padding:22px 20px;gap:14px}
.qr-box{background:white;border-radius:16px;padding:16px;width:178px;height:178px;
  display:flex;align-items:center;justify-content:center}
.addr-chip{background:var(--card2);border-radius:12px;padding:10px 14px;
  font-size:11px;color:var(--muted);font-family:monospace;text-align:center;
  word-break:break-all;cursor:pointer;border:1px solid var(--border);width:100%}

/* Password */
.pw-card{background:#1A1D21;border:1px solid rgba(246,133,27,0.25);border-radius:20px;
  padding:32px 24px;width:100%;max-width:300px;text-align:center}
.pw-ic{font-size:28px;margin-bottom:8px}
.pw-ttl{font-size:18px;font-weight:700;color:var(--text);margin-bottom:4px}
.pw-sub{font-size:13px;color:var(--muted);margin-bottom:22px}
.pw-in{width:100%;padding:12px 15px;background:var(--card);border:1px solid rgba(255,255,255,0.1);
  border-radius:12px;color:var(--text);font-size:14px;outline:none;margin-bottom:6px}
.pw-in.err{border-color:var(--red)}
.pw-err{color:var(--red);font-size:12px;margin-bottom:8px}

/* Confetti */
.confetti-piece{position:fixed;width:8px;height:8px;border-radius:2px;
  animation:confettiFall linear forwards;pointer-events:none;z-index:999}
@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}

/* Toast */
.toast{position:fixed;top:calc(env(safe-area-inset-top,0px) + 16px);left:50%;
  transform:translateX(-50%);padding:10px 22px;border-radius:12px;font-size:14px;
  font-weight:600;z-index:9999;pointer-events:none;white-space:nowrap;animation:slideDown .3s ease}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes slideDown{from{opacity:0;transform:translateX(-50%) translateY(-8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes fadeIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
@keyframes popIn{from{opacity:0;transform:scale(.5)}to{opacity:1;transform:scale(1)}}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ══════════════════════════════════════════════════════════
// SERVICE WORKER
// ══════════════════════════════════════════════════════════
if('serviceWorker'in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
}

// Lock helpers
function lockEnd(sd,mo){const d=new Date(sd+'T00:00:00');d.setMonth(d.getMonth()+mo);return d;}
function lockProg(sd,mo){const s=new Date(sd+'T00:00:00'),e=lockEnd(sd,mo);return Math.min(100,Math.max(0,(Date.now()-s)/(e-s)*100));}
function msLeft(sd,mo){return lockEnd(sd,mo)-Date.now();}
function fmtCd(ms){
  if(ms<=0)return'✓ UNLOCKED';
  const s=Math.floor(ms/1000),d=Math.floor(s/86400),h=Math.floor((s%86400)/3600),m=Math.floor((s%3600)/60),sec=s%60;
  if(d>30)return d+'d '+h+'h remaining';
  if(d>0)return d+'d '+h+'h '+m+'m';
  return h+'h '+m+'m '+sec+'s';
}

async function fetchPrices(){
  try{
    const syms=st.tokens.filter(t=>!['USDT','USDC','DAI','BUSD'].includes(t.symbol)).map(t=>t.symbol+'USDT');
    if(!syms.length)return;
    const url=`https://api.binance.com/api/v3/ticker/24hr?symbols=${encodeURIComponent(JSON.stringify(syms))}`;
    const res=await fetch(url);if(!res.ok)return;
    const data=await res.json();
    data.forEach(item=>{
      const sym=item.symbol.replace('USDT','');
      const price=parseFloat(item.lastPrice);
      const chg=parseFloat(item.priceChangePercent);
      if(price>0){
        st.prices[sym]=price;
        st.changes[sym]=(chg>=0?'+':'')+chg.toFixed(2)+'%';
        st.positives[sym]=chg>0.05?true:chg<-0.05?false:null;
      }
    });
    save();render();
  }catch(e){/* silent fail, use cached prices */}
}

// Simple QR-like pattern from address
function buildQR(addr){
  const seed=parseInt((addr||'0x742d').slice(2,10),16)||12345;
  let rng=seed;const next=()=>{rng=(rng*1664525+1013904223)&0xffffffff;return(rng>>>0)/0xffffffff;};
  let cells='';
  const s=19;
  for(let r=0;r<s;r++){for(let c=0;c<s;c++){
    const edge=(r<2||r>=s-2||c<2||c>=s-2);
    const corner=(r<7&&c<7)||(r<7&&c>=s-7)||(r>=s-7&&c<7);
    let on=corner?((r===0||r===6||c===0||c===6)||(r>=2&&r<=4&&c>=2&&c<=4)):edge?false:next()>0.45;
    cells+=`<rect x="${c*7+1}" y="${r*7+1}" width="6" height="6" fill="${on?'#000':'#fff'}" rx="1"/>`;
  }}
  return`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 136 136" width="148" height="148"><rect width="136" height="136" fill="white"/>${cells}</svg>`;
}

    const endStr=fDate(end.toISOString().split('T')[0]);
    return`<div class="pool-card">
      <div class="pool-top">

// ── ACTIVITY ────────────────────────────────────────────
function buildActivity(){
  if(!st.txns.length) return`<div class="empty"><div class="empty-ic">📋</div><div class="empty-tx">No transactions yet</div></div>`;
  return st.txns.slice().reverse().map(tx=>{
    const isSend=tx.type==='send';
    const isSwap=tx.type==='swap';
    const bg=isSend?'rgba(239,68,68,0.12)':isSwap?'rgba(246,133,27,0.12)':'rgba(16,185,129,0.12)';
    const ic=isSend?'↑':isSwap?'⇄':'↓';
    const clr=isSend?'var(--red)':isSwap?'var(--orange)':'var(--green)';
    const lbl=isSwap?`Swapped ${tx.fromSym}→${tx.toSym}`:isSend?`Sent ${tx.symbol}`:`Received ${tx.symbol}`;
    const addr=isSend?`To: ${trunc(tx.to)}`:`From: ${trunc(tx.from)}`;
    const sign=isSend?'-':isSwap?'':'+';
    const amtStr=isSwap?`${fQ(tx.qty)} ${tx.fromSym} → ${fQ(tx.toQty)} ${tx.toSym}`:`${sign}${fQ(tx.qty)} ${tx.symbol}`;
    return`<div class="tx-row">
      <div class="tx-ic" style="background:${bg};color:${clr}">${ic}</div>
      <div class="tx-info">
        <div class="tx-type">${lbl}</div>
        <div class="tx-addr">${addr}</div>
      </div>
      <div class="tx-vals">
        <div class="tx-amt" style="color:${clr}">${amtStr}</div>
        <div class="tx-date">${timeAgo(tx.date)} · ${tx.status}</div>
      </div></div>`;
  }).join('');
}

function buildSwap(){
  const opts=st.tokens.map(t=>`<option value="${t.symbol}">${t.symbol}</option>`).join('');

    const fromPrice=st.prices[fromSym]||1;
    const toPrice=st.prices[toSym]||1;
    const amt=parseFloat(M.data.amt)||0;

        <div class="field span2"><label>Pair / Description</label><input data-p="${p.id}" data-f="pair" value="${p.pair}"></div>
        <div class="field"><label>USD Amount Locked</label><input data-p="${p.id}" data-f="amount" type="number" step="0.01" value="${p.amount}"></div>
        <div class="field"><label>APY %</label><input data-p="${p.id}" data-f="apy" type="number" step="0.1" value="${p.apy}"></div>
        <div class="field"><label>Lock Start Date</label><input data-p="${p.id}" data-f="startDate" type="date" value="${p.startDate}"></div>
        <div class="field"><label>Duration (months)</label><input data-p="${p.id}" data-f="lockMonths" type="number" min="1" value="${p.lockMonths}"></div>
        <div class="field span2"><label>Color</label><input data-p="${p.id}" data-f="color" type="color" value="${p.color}"></div>
      </div>
    </div>`).join('');

  const newTokForm=M.addTok?`
    <div class="edit-card" style="border-color:rgba(246,133,27,.35)">
      <div class="edit-top"><span class="edit-nm">New Token</span><button class="rm-btn" id="nt-cancel">Cancel</button></div>
      <div class="g2">
        <div class="field"><label>Symbol</label><input id="nt-sym" placeholder="SOL"></div>
        <div class="field"><label>Name</label><input id="nt-name" placeholder="Solana"></div>
        <div class="field span2"><label>Quantity</label><input id="nt-qty" type="number" step="any" placeholder="10"></div>
        <div class="field span2"><label>Color</label><input id="nt-col" type="color" value="#9945FF"></div>
      </div>
      <button class="btn btn-pri btn-full" id="nt-ok" style="margin-top:8px">Add Token</button>
    </div>`:`<button class="add-btn" id="add-tok">+ Add Token</button>`;

  const newPoolForm=M.addPool?`
    <div class="edit-card" style="border-color:rgba(246,133,27,.35)">
      <div class="edit-top"><span class="edit-nm">New Pool</span><button class="rm-btn" id="np-cancel">Cancel</button></div>
      <div class="g2">
        <div class="field"><label>Protocol</label><input id="np-proto" placeholder="Yearn"></div>
        <div class="field"><label>Icon Letter</label><input id="np-init" placeholder="Y" maxlength="2"></div>
        <div class="field span2"><label>Pair</label><input id="np-pair" placeholder="USDC Vault"></div>
        <div class="field"><label>USD Amount</label><input id="np-amt" type="number" step="0.01" placeholder="5000"></div>
        <div class="field"><label>APY %</label><input id="np-apy" type="number" step="0.1" placeholder="12.5"></div>
        <div class="field"><label>Start Date</label><input id="np-date" type="date" value="2026-02-03"></div>
        <div class="field"><label>Duration (months)</label><input id="np-dur" type="number" value="12" min="1"></div>
        <div class="field span2"><label>Color</label><input id="np-col" type="color" value="#F6851B"></div>
      </div>
      <button class="btn btn-pri btn-full" id="np-ok" style="margin-top:8px">Add Pool</button>
    </div>`:`<button class="add-btn" id="add-pool">+ Add DeFi Pool</button>`;

  return`<div class="overlay ctr" id="ov">
    <div class="adm-modal">
      <div class="adm-hdr">
        <div><div class="adm-tag">⌨ Ctrl+Shift+A · Secret</div><div class="adm-ttl">Wallet Control Panel</div></div>
        <button class="close-btn" id="adm-close">✕</button>
      </div>
      <div class="adm-body">
        <div class="sec">
          <div class="sec-t">Wallet Settings</div>
          <div class="field"><label>Wallet Address</label><input id="d-addr" value="${d.wallet.address}"></div>
          <div class="g2">
            <div class="field"><label>Network</label><input id="d-net" value="${d.wallet.network}"></div>
            <div class="field"><label>Total Display (override)</label><input id="d-over" placeholder="Leave blank to use live total" value="${d.wallet.override||''}"></div>
          </div>
        </div>
        <div class="sec">
          <div class="sec-t">Verified Badge</div>
          <div class="tog-row">
            <div class="tog-info"><div>Show Verified ✓ Badge</div><div>Pulsing green badge on main balance</div></div>
            <div class="tog" id="tog-lock" style="background:${d.wallet.locked?'var(--green)':'var(--card2)'}">
              <div class="tog-th" style="left:${d.wallet.locked?'23px':'3px'}"></div>
            </div>
          </div>
          ${d.wallet.locked?`<div class="field"><label>Badge Text</label><input id="d-lbl" value="${d.wallet.lockLabel}"></div>`:''}
        </div>
        <div class="sec">
          <div class="sec-t">Token Balances <span style="font-weight:400;text-transform:none;font-size:10px">(prices auto-fetched from Binance)</span></div>
          ${tokCards}${newTokForm}
        </div>
        <div class="sec">
          <div class="sec-t">DeFi Pool Positions</div>
          ${poolCards}${newPoolForm}
        </div>
        <div class="sec">
          <div class="sec-t">KYC Information</div>
          <div class="g2">
            <div class="field span2"><label>Full Name</label><input id="k-name" value="${d.kyc.name}"></div>
            <div class="field"><label>Phone</label><input id="k-phone" value="${d.kyc.phone}"></div>
            <div class="field"><label>Email</label><input id="k-email" value="${d.kyc.email}"></div>
          </div>
        </div>
        <div class="btn-row">
          <button class="btn btn-ghost" id="adm-discard">Discard</button>
          <button class="btn btn-pri" id="adm-save">Save & Apply Changes</button>
        </div>
      </div>
    </div></div>`;
}

// ══════════════════════════════════════════════════════════
// EVENT BINDING
// ══════════════════════════════════════════════════════════
function bind(){
  const $=id=>document.getElementById(id);
  const on=(id,ev,fn)=>$(id)?.addEventListener(ev,fn);

  // Nav
  document.querySelectorAll('[data-nav]').forEach(el=>el.addEventListener('click',()=>{st.view=el.dataset.nav;save();render();}));
  document.querySelectorAll('[data-wtab]').forEach(el=>el.addEventListener('click',()=>{st.tab=el.dataset.wtab;save();render();}));

  // Copy address
  on('cp-addr','click',()=>{
    navigator.clipboard?.writeText(st.wallet.address).catch(()=>{});
    const ic=$('cp-ic');if(ic){ic.textContent='✓';ic.style.color='var(--green)';}
    setTimeout(()=>{const ic=$('cp-ic');if(ic){ic.textContent='⧉';ic.style.color='';}},1500);
    showToast('Address copied!');
  });

  // Fox logo — 5 taps in 3s = admin (mobile)
  on('fox-btn','click',()=>{
    const now=Date.now();
    M.taps=[...M.taps,now].filter(t=>now-t<3000);
    if(M.taps.length>=5){M.taps=[];openAdmin();}
  });

  // Action buttons
  on('act-send','click',()=>{M={...M,type:'send',step:0,data:{sym:st.tokens[0]?.symbol}};render();});
  on('act-receive','click',()=>{M={...M,type:'receive',step:0,data:{}};render();});
  on('act-swap','click',()=>{M={...M,type:'swap',step:0,data:{fromSym:'ETH',toSym:'USDT'}};render();});
  on('act-bridge','click',()=>{M={...M,type:'bridge',step:0,data:{}};render();});

  // Close overlay by clicking backdrop
  on('ov','click',e=>{if(e.target.id==='ov'){M.type=null;render();}});

  // ── SEND ──
  on('s-tok','change',e=>{M.data.sym=e.target.value;render();});
  on('s-max','click',()=>{const t=st.tokens.find(x=>x.symbol===(M.data.sym||'ETH'));if(t)M.data.amt=String(t.qty);render();});
  on('s-amt','input',e=>M.data.amt=e.target.value);
  on('s-addr','input',e=>M.data.addr=e.target.value);
  on('s-next','click',()=>{
    const amt=parseFloat(M.data.amt||0);const tok=st.tokens.find(t=>t.symbol===M.data.sym);
    if(!amt||amt<=0){showToast('Enter valid amount','#EF4444');return;}
    if(tok&&amt>tok.qty){showToast('Insufficient balance','#EF4444');return;}
    if(!M.data.addr||M.data.addr.length<10){showToast('Enter valid address','#EF4444');return;}
    M.step=1;render();
  });
  on('s-back','click',()=>{M.step=0;render();});
  on('s-confirm','click',()=>{M.step=2;render();});
  on('s-close','click',()=>{M.type=null;render();});
  on('s-done','click',()=>{M.type=null;render();});
  on('hash-cp','click',()=>{navigator.clipboard?.writeText(M.data.hash||'').catch(()=>{});showToast('Hash copied!');});

  // ── RECEIVE ──
  on('cp-btn','click',()=>{navigator.clipboard?.writeText(st.wallet.address).catch(()=>{});showToast('Address copied!');});
  on('cp-qr','click',()=>{navigator.clipboard?.writeText(st.wallet.address).catch(()=>{});showToast('Address copied!');});
  on('rv-close','click',()=>{M.type=null;render();});

  // ── SWAP ──
  on('sw-from','change',e=>{M.data.fromSym=e.target.value;render();});
  on('sw-to','change',e=>{M.data.toSym=e.target.value;render();});
  on('sw-amt','input',e=>{M.data.amt=e.target.value;render();});
  on('sw-max','click',()=>{const t=st.tokens.find(x=>x.symbol===(M.data.fromSym||'ETH'));if(t){M.data.amt=String(t.qty);render();}});
  on('sw-flip','click',()=>{const tmp=M.data.fromSym;M.data.fromSym=M.data.toSym;M.data.toSym=tmp;render();});
  on('sw-next','click',()=>{
    const amt=parseFloat(M.data.amt||0);
    if(!amt||amt<=0){showToast('Enter valid amount','#EF4444');return;}
    const tok=st.tokens.find(t=>t.symbol===M.data.fromSym);
    if(tok&&amt>tok.qty){showToast('Insufficient balance','#EF4444');return;}
    M.step=1;render();
  });
  on('sw-back','click',()=>{M.step=0;render();});
  on('sw-confirm','click',()=>{
    M.step=2;render();
    const fp=st.prices[M.data.fromSym]||1,tp=st.prices[M.data.toSym]||1;
    const qty=parseFloat(M.data.amt)||0;const toQ=qty*fp/tp*0.995;
    M.data.toQ=toQ;
    setTimeout(()=>{
      // update balances
      const fromTok=st.tokens.find(t=>t.symbol===M.data.fromSym);
      const toTok=st.tokens.find(t=>t.symbol===M.data.toSym);
      if(fromTok)fromTok.qty=Math.max(0,fromTok.qty-qty);
      if(toTok)toTok.qty+=toQ;
      st.txns.push({id:'tx'+Date.now(),type:'swap',symbol:M.data.fromSym,qty,
        fromSym:M.data.fromSym,toSym:M.data.toSym,toQ,
        from:st.wallet.address,to:st.wallet.address,
        date:new Date().toISOString(),hash:randHash(),status:'confirmed'});
      save();M.step=3;render();confetti();
    },2000);
  });
  on('sw-close','click',()=>{M.type=null;render();});
  on('sw-done','click',()=>{M.type=null;render();});

  // ── BRIDGE ──
  on('br-next','click',()=>{M.step=1;render();setTimeout(()=>{M.step=2;render();confetti();},3000);});
  on('br-close','click',()=>{M.type=null;render();});
  on('br-done','click',()=>{M.type=null;render();});

  // ── ADMIN PASSWORD ──
  on('pw-in','keydown',e=>{if(e.key==='Enter')tryLogin();});
  on('adm-ok','click',tryLogin);
  on('adm-cancel','click',()=>{M.type=null;render();});
  setTimeout(()=>$('pw-in')?.focus(),80);

  // ── ADMIN PANEL ──
  on('adm-close','click',()=>{M.type=null;M.auth=false;render();});
  on('adm-discard','click',()=>{M.type=null;M.auth=false;render();});
  on('adm-save','click',()=>{
    st=clone(M.draft);save();
    M.type=null;M.auth=false;
    showToast('✓ Changes saved & applied');render();
  });

  // Admin toggles
  on('tog-lock','click',()=>{M.draft.wallet.locked=!M.draft.wallet.locked;render();scrollAdm();});

  // Admin live inputs
  ['d-addr','d-net','d-lbl','d-over'].forEach(id=>{
    on(id,'input',e=>{
      if(id==='d-addr')M.draft.wallet.address=e.target.value;
      if(id==='d-net')M.draft.wallet.network=e.target.value;
      if(id==='d-lbl')M.draft.wallet.lockLabel=e.target.value;
      if(id==='d-over')M.draft.wallet.override=e.target.value;
    });
  });
  ['k-name','k-phone','k-email'].forEach(id=>{
    on(id,'input',e=>{
      if(id==='k-name')M.draft.kyc.name=e.target.value;
      if(id==='k-phone')M.draft.kyc.phone=e.target.value;
      if(id==='k-email')M.draft.kyc.email=e.target.value;
    });
  });

  // Token field edits
  document.querySelectorAll('[data-t][data-f]').forEach(el=>el.addEventListener('input',()=>{
    const tok=M.draft.tokens.find(t=>String(t.id)===el.dataset.t);
    if(!tok)return;
    tok[el.dataset.f]=el.dataset.f==='qty'?parseFloat(el.value)||0:el.value;
  }));

  // Pool field edits
  document.querySelectorAll('[data-p][data-f]').forEach(el=>el.addEventListener('input',()=>{
    const pool=M.draft.defi.find(p=>String(p.id)===el.dataset.p);
    if(!pool)return;
    pool[el.dataset.f]=['amount','apy','lockMonths'].includes(el.dataset.f)?parseFloat(el.value)||0:el.value;
  }));

  // Remove token/pool
  document.querySelectorAll('[data-rt]').forEach(el=>el.addEventListener('click',()=>{
    M.draft.tokens=M.draft.tokens.filter(t=>String(t.id)!==el.dataset.rt);render();scrollAdm();
  }));
  document.querySelectorAll('[data-rp]').forEach(el=>el.addEventListener('click',()=>{
    M.draft.defi=M.draft.defi.filter(p=>String(p.id)!==el.dataset.rp);render();scrollAdm();
  }));

  // Add token flow
  on('add-tok','click',()=>{M.addTok=true;render();scrollAdm();});
  on('nt-cancel','click',()=>{M.addTok=false;render();});
  on('nt-ok','click',()=>{
    const sym=($('nt-sym')?.value||'').trim().toUpperCase();
    const name=($('nt-name')?.value||'').trim();
    if(!sym||!name){showToast('Symbol & name required','#EF4444');return;}
    M.draft.tokens.push({id:Date.now(),symbol:sym,name,qty:parseFloat($('nt-qty')?.value)||0,color:$('nt-col')?.value||'#6B7280'});
    M.addTok=false;render();
  });

  // Add pool flow
  on('add-pool','click',()=>{M.addPool=true;render();scrollAdm();});
  on('np-cancel','click',()=>{M.addPool=false;render();});
  on('np-ok','click',()=>{
    const proto=($('np-proto')?.value||'').trim();
    if(!proto){showToast('Protocol name required','#EF4444');return;}
    M.draft.defi.push({id:Date.now(),protocol:proto,
      initial:$('np-init')?.value||proto[0],pair:$('np-pair')?.value||'',
      amount:parseFloat($('np-amt')?.value)||0,apy:parseFloat($('np-apy')?.value)||0,
      startDate:$('np-date')?.value||'2026-02-03',lockMonths:parseInt($('np-dur')?.value)||12,
      color:$('np-col')?.value||'#F6851B'});
    M.addPool=false;render();
  });
}

function tryLogin(){
  const pw=document.getElementById('pw-in')?.value||'';
  if(pw===PASS){M.auth=true;M.pwErr=false;M.draft=clone(st);M.addTok=false;M.addPool=false;render();setTimeout(()=>{document.querySelector('.adm-modal')?.scrollTo(0,0);},50);}
  else{M.pwErr=true;M.pwInput=pw;render();setTimeout(()=>document.getElementById('pw-in')?.focus(),60);}
}
function openAdmin(){M.type='admin';M.auth=false;M.pwErr=false;M.pwInput='';render();}
function scrollAdm(){setTimeout(()=>{const m=document.querySelector('.adm-modal');if(m)m.scrollTop=m.scrollHeight;},60);}

// DeFi countdown tick
function startCd(){
  function tick(){document.querySelectorAll('.cd[data-sd]').forEach(el=>{
    const ms=msLeft(el.dataset.sd,+el.dataset.mo);el.textContent=fmtCd(ms);el.classList.toggle('done',ms<=0);
  });}
  tick();cdTick=setInterval(tick,1000);
}

// ══════════════════════════════════════════════════════════
// KEYBOARD SHORTCUT: Ctrl+Shift+A = Admin
// ══════════════════════════════════════════════════════════
document.addEventListener('keydown',e=>{
  if(e.ctrlKey&&e.shiftKey&&(e.key==='A'||e.key==='a')){
    e.preventDefault();openAdmin();
  }
});

// ══════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════
st=loadSt();
render();
fetchPrices();
priceTick=setInterval(fetchPrices,30000); // refresh every 30s
</script>
</body>
</html>
